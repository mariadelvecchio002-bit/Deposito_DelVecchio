<!DOCTYPE html>

<html>
    <head>
       <!-- ci dice carattere 99% si mette così -->
        <meta charset="utf-8">
        <!-- descrizione della pagina -->
        <meta name="description" content="esempio di pagina HTML">
        <!-- nome di chi ha creato la pagina, l'autore -->
        <meta name="author" content="Nome Autore">
        <!-- ci dice quanto una pagina si può zoommare o adattare a schermi di dimensioni diverse -->
        <meta name="viewport" content="width=device-width, initial-scale=1">
    
<!-- titolo pagina -->
        <title>esempio semantico</title>
    </head>
    <body>
    <header>
        <h1>Sito di esempio</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Contatti</a>
    </nav>
    <main>
        <section>
            <h2>Sezione principale</h2>
            <p>Contenuto della sezione</p>
        </section>
        <article>
            <h2>Articolo</h2>
            <p>Testo di un contenuto indipendente</p>
        </article>
    </main>
    <footer>
        <p>Copyright 2026</p>
    </footer>
    
    <!-- spessore bordo -->
    <table border="1">
        <thead>
        <tr>
            <!-- titolo ogni colonna -->
            <th>Nome</th>
            <th>Età</th>
            <th>Ruolo</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <!-- compilo le celle della prima riga -->
            <td>Mario</td>
            <td>25</td>
            <td>Studente</td>
        </tr>
        <tr>
            <td>Laura</td>
            <td>30</td>
            <td>Docente</td>
        </tr>
        </tbody>
    </table>
    </body>
</html>
