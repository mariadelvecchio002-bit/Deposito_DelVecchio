<!DOCTYPE html>
<html>
    <head>
        <title>esempio pagina di registrazione</title> 
    </head>
    <body>
     <div>
        <h1>Form di registrazione</h1>
        <p>Compila il <strong>form</strong> per registrarti:</p>
        </div>
         
        <div>
 <h2>registrazione</h2>
 <label for="nome">Nome:</label>
 <input type="text" id="nome" name="nome" placeholder="Inserisci il tuo nome">
 <label for="email">Email:</label>
 <input type="email" id="email" name="email" placeholder="Inserisci la tua email" required>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="Inserisci la tua password">
</div>
 <div>
    <p>Scegli tipo di account:</p>
    <input type="radio" id="accountStandard" name="account" value="standard">
    <label for="accountStandard">Standard</label>
    <input type="radio" id="accountPremium" name="account" value="premium">
    <label for="accountPremium">Premium</label>
 </div>
<div>
    <label for="provincia">Provincia:</label>
    <select id="provincia" name="provincia">
        <option value="roma">Latina</option>
        <option value="milano">Rieti</option>
        <option value="napoli">Viterbo</option>
</div>

<div>
    <input type="checkbox" id="si" name="trattamento privacy" value="si">
    <label for="si">Accetto il trattamento dei dati personali</label>
</div>
     </body>
    </body>
</html>
