<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Pomeriggio</title>
    <meta name="description" content="esempi">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="giornata2pom.css">
</head>

<body>
    <!-- creo un div esterno contenitore, che contiene un div interno box -->
    <div class="contenitore">Ciao
        <div class="box">Elemento</div>
    </div>

<!-- provo il flexbox -->
    <div class="conteiner">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>
<!-- provo grigla -->
    <div class="conteiner2">
        <div class="item2">1</div>
        <div class="item2">2</div>
        <div class="item2">3</div>
    </div>
<!-- Provo griglia con 3 colonne e 2 righe -->
    <div class="container3">
        <div class="item3 item4">A</div>
        <div class="item3 item5">B</div>
        <div class="item3">C</div>
    </div>

    <!-- provo template areas -->
    <div class="container4">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
        <div class="footer">Footer</div>
    </div>
</body>

</html>
